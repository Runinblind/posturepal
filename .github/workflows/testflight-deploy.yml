name: Deploy to TestFlight

on:
  push:
    tags:
      - 'v*.*.*' # Trigger on version tags (e.g., v1.0.0)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  XCODE_VERSION: '15.2'

jobs:
  deploy:
    name: Build & Deploy to TestFlight
    runs-on: macos-14
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
        xcodebuild -version
        
    - name: Import Signing Certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE }}
        CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
      run: |
        # Create temporary keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
        
        # Create keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        # Import certificate
        echo $CERTIFICATE_BASE64 | base64 --decode > certificate.p12
        security import certificate.p12 -k $KEYCHAIN_PATH -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        # Set default keychain
        security list-keychain -d user -s $KEYCHAIN_PATH
        
        rm certificate.p12
        
    - name: Import Provisioning Profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE }}
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo $PROVISIONING_PROFILE_BASE64 | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
        
    - name: Increment Build Number
      run: |
        # Auto-increment build number based on GitHub run number
        BUILD_NUMBER=${{ github.run_number }}
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" PosturePalPro/Info.plist
        echo "Build number set to: $BUILD_NUMBER"
        
    - name: Build Archive
      run: |
        xcodebuild archive \
          -project PosturePalPro.xcodeproj \
          -scheme PosturePalPro \
          -archivePath build/PosturePalPro.xcarchive \
          -configuration Release \
          -allowProvisioningUpdates \
          | xcpretty
          
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/PosturePalPro.xcarchive \
          -exportPath build/ \
          -exportOptionsPlist ExportOptions.plist \
          | xcpretty
          
    - name: Upload to TestFlight
      env:
        APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      run: |
        xcrun altool --upload-app \
          --type ios \
          --file build/PosturePalPro.ipa \
          --apiKey $APP_STORE_CONNECT_API_KEY_ID \
          --apiIssuer $APP_STORE_CONNECT_API_ISSUER_ID
          
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PosturePalPro-Release-IPA
        path: build/PosturePalPro.ipa
        retention-days: 90
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: build/PosturePalPro.ipa
        body: |
          ## PosturePal Pro v${{ github.ref_name }}
          
          **Release Notes:**
          - Automated TestFlight deployment
          - Build #${{ github.run_number }}
          
          Download the IPA from artifacts or install via TestFlight.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
