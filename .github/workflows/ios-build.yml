name: iOS Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

env:
  XCODE_VERSION: '15.2'
  IOS_SIMULATOR: 'iPhone 15 Pro'
  IOS_VERSION: '17.2'

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14 # Latest macOS with Xcode pre-installed
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
        xcodebuild -version
        
    - name: Cache Swift Packages
      uses: actions/cache@v3
      with:
        path: |
          .build
          SourcePackages
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
          
    - name: Install Dependencies (RevenueCat)
      run: |
        # Dependencies will be fetched by Xcode during build
        echo "Swift Package dependencies will be resolved automatically"
        
    - name: Build iOS App
      run: |
        # Let xcodebuild use its default DerivedData location - stop fighting it
        xcodebuild clean build \
          -project PosturePalPro.xcodeproj \
          -scheme PosturePalPro \
          -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.IOS_VERSION }}" \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true
        
        # Debug: Show what was actually built and where
        echo "📂 Searching for built .app bundles:"
        find . -name "PosturePalPro.app" -type d 2>/dev/null || echo "No .app found yet"
          
    - name: Build Watch App
      run: |
        # Same approach - let xcodebuild do its thing
        xcodebuild build \
          -project PosturePalPro.xcodeproj \
          -scheme "PosturePal Watch" \
          -destination "platform=watchOS Simulator,name=Apple Watch Series 9 (45mm)" \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true
          
    - name: Run Unit Tests
      run: |
        xcodebuild test \
          -project PosturePalPro.xcodeproj \
          -scheme PosturePalPro \
          -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.IOS_VERSION }}" \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          | xcpretty || true
          
    - name: Package Simulator Build
      run: |
        echo "🔍 Searching for built .app bundle..."
        
        # Find ANY PosturePalPro.app that was just built
        APP_PATH=$(find . -name "PosturePalPro.app" -type d -path "*/Debug-iphonesimulator/*" 2>/dev/null | head -1)
        
        # If not found with iphonesimulator, try any Debug path
        if [ -z "$APP_PATH" ]; then
          echo "⚠️ Not found in Debug-iphonesimulator, trying any Debug path..."
          APP_PATH=$(find . -name "PosturePalPro.app" -type d -path "*/Debug*" 2>/dev/null | head -1)
        fi
        
        # If STILL not found, try absolutely anywhere
        if [ -z "$APP_PATH" ]; then
          echo "⚠️ Searching entire workspace..."
          APP_PATH=$(find . -name "PosturePalPro.app" -type d 2>/dev/null | head -1)
        fi
        
        # If we STILL can't find it, something is seriously wrong
        if [ -z "$APP_PATH" ]; then
          echo "❌ CRITICAL: Cannot find PosturePalPro.app anywhere"
          echo ""
          echo "📂 Showing all .app bundles:"
          find . -type d -name "*.app" 2>/dev/null
          echo ""
          echo "📂 Showing build-related directories:"
          find . -type d \( -name "build" -o -name "Build" -o -name "DerivedData" \) 2>/dev/null
          echo ""
          echo "📂 Top-level contents:"
          ls -la
          exit 1
        fi
        
        echo "✅ Found app at: $APP_PATH"
        
        # Get app info
        APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
        echo "📊 App bundle size: $APP_SIZE"
        
        # Create artifacts directory
        mkdir -p artifacts
        
        # Zip it wherever it is
        echo "🗜️ Creating zip archive..."
        cd "$(dirname "$APP_PATH")"
        zip -r "$OLDPWD/artifacts/PosturePalPro-Simulator.zip" "$(basename "$APP_PATH")"
        cd "$OLDPWD"
        
        # Verify zip exists
        if [ ! -f "artifacts/PosturePalPro-Simulator.zip" ]; then
          echo "❌ Failed to create zip"
          exit 1
        fi
        
        ZIP_SIZE=$(du -sh artifacts/PosturePalPro-Simulator.zip | cut -f1)
        echo "✅ Successfully packaged: $ZIP_SIZE"
        echo "📦 Location: artifacts/PosturePalPro-Simulator.zip"
        
    - name: Upload Simulator Build
      uses: actions/upload-artifact@v4
      with:
        name: PosturePalPro-Simulator-Build
        path: artifacts/PosturePalPro-Simulator.zip
        retention-days: 30
        
    - name: Generate Build Report
      if: always()
      run: |
        echo "## 📱 iOS Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Xcode Version:** ${{ env.XCODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Target Device:** ${{ env.IOS_SIMULATOR }}" >> $GITHUB_STEP_SUMMARY
        echo "- **iOS Version:** ${{ env.IOS_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "Download the simulator build from the Actions artifacts." >> $GITHUB_STEP_SUMMARY
