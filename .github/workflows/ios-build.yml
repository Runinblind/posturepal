name: iOS Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

env:
  XCODE_VERSION: '15.2'
  IOS_SIMULATOR: 'iPhone 15 Pro'
  IOS_VERSION: '17.2'

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14 # Latest macOS with Xcode pre-installed
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
        xcodebuild -version
        
    - name: Cache Swift Packages
      uses: actions/cache@v3
      with:
        path: |
          .build
          SourcePackages
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
          
    - name: Install Dependencies (RevenueCat)
      run: |
        # Dependencies will be fetched by Xcode during build
        echo "Swift Package dependencies will be resolved automatically"
        
    - name: Build iOS App
      run: |
        # Use SYMROOT and OBJROOT for explicit, reliable control
        xcodebuild clean build \
          -project PosturePalPro.xcodeproj \
          -scheme PosturePalPro \
          -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.IOS_VERSION }}" \
          -configuration Debug \
          SYMROOT=./build \
          OBJROOT=./build/obj \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true
        
        # Debug: Show what was actually built and where
        echo "📂 Build output structure:"
        find ./build -name "*.app" -type d || true
        echo ""
        echo "📂 Expected location contents:"
        ls -la ./build/Debug-iphonesimulator/ 2>/dev/null || echo "Directory doesn't exist"
          
    - name: Build Watch App
      run: |
        # Use same SYMROOT pattern for consistency
        xcodebuild build \
          -project PosturePalPro.xcodeproj \
          -scheme "PosturePal Watch" \
          -destination "platform=watchOS Simulator,name=Apple Watch Series 9 (45mm)" \
          -configuration Debug \
          SYMROOT=./build \
          OBJROOT=./build/obj \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true
          
    - name: Run Unit Tests
      run: |
        xcodebuild test \
          -project PosturePalPro.xcodeproj \
          -scheme PosturePalPro \
          -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.IOS_VERSION }}" \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          | xcpretty || true
          
    - name: Package Simulator Build
      run: |
        # The app should be at ./build/Debug-iphonesimulator/PosturePalPro.app
        APP_PATH="./build/Debug-iphonesimulator/PosturePalPro.app"
        
        if [ ! -d "$APP_PATH" ]; then
          echo "❌ App not found at $APP_PATH"
          echo ""
          echo "📂 Searching for .app bundles:"
          find ./build -name "*.app" -type d
          echo ""
          echo "📂 Build directory structure (top 100 lines):"
          ls -laR ./build/ | head -100
          exit 1
        fi
        
        echo "✅ Found app at: $APP_PATH"
        ls -lh "$APP_PATH"
        
        # Create artifacts directory
        mkdir -p artifacts
        
        # Zip directly from build location
        echo "🗜️ Creating zip..."
        cd ./build/Debug-iphonesimulator
        zip -r "$OLDPWD/artifacts/PosturePalPro-Simulator.zip" PosturePalPro.app
        cd "$OLDPWD"
        
        # Verify zip was created
        if [ ! -f "artifacts/PosturePalPro-Simulator.zip" ]; then
          echo "❌ Zip creation failed"
          exit 1
        fi
        
        ZIP_SIZE=$(du -sh artifacts/PosturePalPro-Simulator.zip | cut -f1)
        echo "✅ Created zip: $ZIP_SIZE"
        
    - name: Upload Simulator Build
      uses: actions/upload-artifact@v4
      with:
        name: PosturePalPro-Simulator-Build
        path: artifacts/PosturePalPro-Simulator.zip
        retention-days: 30
        
    - name: Generate Build Report
      if: always()
      run: |
        echo "## 📱 iOS Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Xcode Version:** ${{ env.XCODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Target Device:** ${{ env.IOS_SIMULATOR }}" >> $GITHUB_STEP_SUMMARY
        echo "- **iOS Version:** ${{ env.IOS_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "Download the simulator build from the Actions artifacts." >> $GITHUB_STEP_SUMMARY
