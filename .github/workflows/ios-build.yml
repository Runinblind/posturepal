name: iOS Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

env:
  XCODE_VERSION: '15.2'
  IOS_SIMULATOR: 'iPhone 15 Pro'
  IOS_VERSION: '17.2'

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14 # Latest macOS with Xcode pre-installed
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app
        xcodebuild -version
        
    - name: Cache Swift Packages
      uses: actions/cache@v3
      with:
        path: |
          .build
          SourcePackages
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
          
    - name: Install Dependencies (RevenueCat)
      run: |
        # Dependencies will be fetched by Xcode during build
        echo "Swift Package dependencies will be resolved automatically"
        
    - name: Build iOS App
      run: |
        xcodebuild clean build \
          -project PosturePalPro.xcodeproj \
          -scheme PosturePalPro \
          -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.IOS_VERSION }}" \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true
          
    - name: Build Watch App
      run: |
        xcodebuild build \
          -project PosturePalPro.xcodeproj \
          -scheme "PosturePal Watch" \
          -destination "platform=watchOS Simulator,name=Apple Watch Series 9 (45mm)" \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true
          
    - name: Run Unit Tests
      run: |
        xcodebuild test \
          -project PosturePalPro.xcodeproj \
          -scheme PosturePalPro \
          -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.IOS_VERSION }}" \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          | xcpretty || true
          
    - name: Package Simulator Build
      run: |
        # Find the built .app from the previous build step
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "PosturePalPro.app" -path "*/Debug-iphonesimulator/*" | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ Error: PosturePalPro.app not found in DerivedData"
          echo "Searching all .app files:"
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d
          exit 1
        fi
        
        echo "✅ Found app at: $APP_PATH"
        
        # Verify it's a valid app bundle
        if [ ! -d "$APP_PATH" ]; then
          echo "❌ Error: Path exists but is not a directory"
          exit 1
        fi
        
        # Create build directory and copy the app
        mkdir -p build
        echo "📦 Copying app to build directory..."
        cp -r "$APP_PATH" build/
        
        # Verify copy succeeded
        if [ ! -d "build/PosturePalPro.app" ]; then
          echo "❌ Error: Failed to copy app to build directory"
          exit 1
        fi
        
        # Get app info for verification
        APP_SIZE=$(du -sh "build/PosturePalPro.app" | cut -f1)
        echo "📊 App bundle size: $APP_SIZE"
        
        # Zip the app bundle
        cd build
        echo "🗜️ Creating zip archive..."
        zip -r PosturePalPro-Simulator.zip PosturePalPro.app
        
        # Verify zip was created
        if [ ! -f "PosturePalPro-Simulator.zip" ]; then
          echo "❌ Error: Failed to create zip archive"
          exit 1
        fi
        
        ZIP_SIZE=$(du -sh PosturePalPro-Simulator.zip | cut -f1)
        echo "✅ Created PosturePalPro-Simulator.zip ($ZIP_SIZE)"
        
    - name: Upload Simulator Build
      uses: actions/upload-artifact@v4
      with:
        name: PosturePalPro-Simulator-Build
        path: build/PosturePalPro-Simulator.zip
        retention-days: 30
        
    - name: Generate Build Report
      if: always()
      run: |
        echo "## 📱 iOS Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Xcode Version:** ${{ env.XCODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Target Device:** ${{ env.IOS_SIMULATOR }}" >> $GITHUB_STEP_SUMMARY
        echo "- **iOS Version:** ${{ env.IOS_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "Download the simulator build from the Actions artifacts." >> $GITHUB_STEP_SUMMARY
